<div class="ac-wrap">
  <div class="ac-title">
    <i class="ti ti-users" aria-hidden="true"></i>
    Користувачі
  </div>

  <!-- Stats -->
  <div class="ac-stats">
    <div class="ac-stat">
      <span class="ac-stat-val">{{ totalCount() }}</span>
      <span class="ac-stat-lbl">Всього</span>
    </div>
    <div class="ac-stat">
      <span class="ac-stat-val">{{ adminCount() }}</span>
      <span class="ac-stat-lbl">Адмінів</span>
    </div>
    <div class="ac-stat">
      <span class="ac-stat-val">{{ bannedCount() }}</span>
      <span class="ac-stat-lbl">Забанених</span>
    </div>
  </div>

  <!-- Table -->
  <div class="ac-table-wrap">
    <table class="ac-table" *ngIf="usersSvc.users().length > 0; else noUsers">
      <thead>
        <tr>
          <th>Email</th>
          <th>Роль</th>
          <th>Статус</th>
          <th>Змінити роль</th>
          <th>Дія</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of usersSvc.users()">
          <td class="td-email">{{ u.email }}</td>
          <td>
            <span class="ac-badge" [class]="roleBadgeClass(u.role)">
              {{ u.role }}
            </span>
          </td>
          <td>
            <span class="ac-badge" [class]="u.banned ? 'b-ban' : 'b-ok'">
              {{ u.banned ? 'заблокований' : 'активний' }}
            </span>
          </td>
          <td>
            <select
              class="ac-select"
              [value]="u.role"
              [disabled]="u.banned"
              (change)="onRoleChange(u.uid, $event)"
            >
              <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
            </select>
          </td>
          <td>
            <button
              class="ac-btn-ban"
              [class.ac-btn-unban]="u.banned"
              (click)="toggleBan(u)"
            >
              {{ u.banned ? 'Розбанити' : 'Бан' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <ng-template #noUsers>
      <div class="ac-empty">
        <i class="ti ti-users-off" aria-hidden="true"></i>
        <p>Користувачів не знайдено</p>
      </div>
    </ng-template>
  </div>
</div>
