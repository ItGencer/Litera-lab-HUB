<div class="ut-wrap">
  @if (users().length > 0) {
    <table class="ut-table">
      <thead>
        <tr>
          <th>Ім'я</th>
          <th>Email</th>
          <th>Роль</th>
          <th>Змінити роль</th>
          <th>Дії</th>
        </tr>
      </thead>
      <tbody>
        @for (user of users(); track user.uid) {
          <tr [class.row-banned]="user.banned">
            <td>{{ user.displayName || '—' }}</td>
            <td class="td-email">{{ user.email }}</td>

            <td>
              <span class="ut-badge" [class]="roleBadgeClass(user.role)">
                {{ user.role }}
              </span>
            </td>

            <td>
              <select
                class="ut-select"
                [disabled]="user.banned"
                (change)="onRoleChange(user.uid, $event)"
              >
                @for (role of roles(); track $index) {
                  <!-- [selected] — єдиний правильний спосіб у @for без ngModel -->
                  <option [value]="role" [selected]="role === user.role">
                    {{ role }}
                  </option>
                }
              </select>
            </td>

            <td class="td-actions">
              <button
                class="ut-btn-ban"
                [class.ut-btn-unban]="user.banned"
                (click)="toggleBan(user)"
              >
                {{ user.banned ? 'Розбанити' : 'Бан' }}
              </button>

              <button class="ut-btn-delete" (click)="onDelete(user.uid)">
                Видалити
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  } @else {
    <div class="ut-empty">
      <p>Користувачів не знайдено</p>
    </div>
  }
</div>
